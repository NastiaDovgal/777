<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продовжуємо спілкування?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
            overflow: hidden; /* Щоб кнопка не створювала смуг прокрутки, коли тікає */
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 90%;
        }

        h1 {
            font-size: 24px;
            color: #000;
            margin-bottom: 40px;
            font-weight: normal;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 50px;
            position: relative;
            min-height: 60px;
            align-items: center;
        }

        .btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
            min-width: 100px;
            transition: background 0.2s;
            user-select: none;
        }

        .btn:active {
            background-color: #357abd;
        }

        /* Стиль для кнопки "Ны", яка буде абсолютно позиціонована під час втечі */
        #btn-no {
            position: relative;
            z-index: 10;
        }

        /* Модальні вікна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            animation: popUp 0.3s ease-out;
        }

        .modal-content h2 {
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #555;
            margin-bottom: 20px;
        }

        /* Стиль для помилки */
        .error-modal h2 {
            color: #d9534f;
        }

        /* Стиль для вітання */
        .success-modal h2 {
            color: #28a745;
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Чи продовжуємо спілкування?</h1>
        <div class="btn-group">
            <button class="btn" id="btn-yes">Так</button>
            <button class="btn" id="btn-no">Ны</button>
        </div>
    </div>

    <div class="modal" id="modal-success">
        <div class="modal-content success-modal">
            <h2>Ура! 🎉</h2>
            <p>Я дуже радий(а), що ми продовжуємо спілкування! Ласкаво просимо!</p>
            <button class="btn" onclick="closeModal('modal-success')">Супер</button>
        </div>
    </div>

    <div class="modal" id="modal-error">
        <div class="modal-content error-modal">
            <h2>Помилка 404 ❌</h2>
            <p>Ця дія заблокована всесвітом. Спробуйте ще раз або здайтеся!</p>
            <button class="btn" onclick="closeModal('modal-error')">Ех, ладно</button>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const modalSuccess = document.getElementById('modal-success');
        const modalError = document.getElementById('modal-error');

        // Функція, яка змушує кнопку тікати
        function moveButton(e) {
            // Змінюємо позиціонування на абсолютне, щоб рухати по всьому екрану
            if (btnNo.style.position !== 'absolute') {
                btnNo.style.position = 'absolute';
            }

            // Рахуємо випадкові координати в межах вікна екрану з відступами
            const padding = 50;
            const maxX = window.innerWidth - btnNo.offsetWidth - padding;
            const maxY = window.innerHeight - btnNo.offsetHeight - padding;

            // Рандомна позиція, але не менше нуля
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // Для ПК: тікає при наведенні мишки
        btnNo.addEventListener('mouseenter', moveButton);

        // Для мобільних: тікає, як тільки палець торкається кнопки (до натискання)
        btnNo.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Запобігає випадковому кліку під час дотику
            moveButton();
        });

        // Якщо користувач виявився супершвидким і зміг клікнути
        btnNo.addEventListener('click', () => {
            modalError.style.display = 'flex';
        });

        // Натискання на "Так"
        btnYes.addEventListener('click', () => {
            modalSuccess.style.display = 'flex';
        });

        // Закриття модальних вікон
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            // Повертаємо кнопку "Ны" на місце, якщо вікно закрили
            if(id === 'modal-error') {
                btnNo.style.position = 'relative';
                btnNo.style.left = 'auto';
                btnNo.style.top = 'auto';
            }
        }
    </script>
</body>
</html>
